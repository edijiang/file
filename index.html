<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TronLink 产品组文档目录</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
    background: #f6f8fa;
    color: #24292f;
    min-height: 100vh;
  }

  .page {
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 32px;
  }

  .logo {
    width: 40px;
    height: 40px;
    background: #E84142;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    font-size: 20px;
    color: #fff;
    flex-shrink: 0;
  }

  .header-text h1 {
    font-size: 20px;
    font-weight: 700;
    color: #24292f;
    line-height: 1.3;
  }

  .header-text p {
    font-size: 13px;
    color: #656d76;
    margin-top: 2px;
  }

  /* ── Directory Table ── */
  .dir-box {
    background: #fff;
    border: 1px solid #d0d7de;
    border-radius: 10px;
    overflow: hidden;
  }

  /* Folder group */
  .folder-group {
    border-bottom: 1px solid #d0d7de;
  }
  .folder-group:last-child {
    border-bottom: none;
  }

  /* Folder row (header) */
  .folder-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 16px;
    background: #f6f8fa;
    border-bottom: 1px solid #d0d7de;
    cursor: pointer;
    user-select: none;
  }

  .folder-row:hover { background: #eef1f3; }

  .folder-icon {
    font-size: 17px;
    flex-shrink: 0;
    line-height: 1;
  }

  .folder-name {
    font-size: 14px;
    font-weight: 600;
    color: #24292f;
    flex: 1;
  }

  .folder-count {
    font-size: 12px;
    color: #656d76;
  }

  .chevron {
    color: #8c959f;
    font-size: 12px;
    transition: transform 0.2s;
  }

  .folder-group.open .chevron {
    transform: rotate(90deg);
  }

  /* File rows inside a folder */
  .file-list {
    display: none;
  }

  .folder-group.open .file-list {
    display: block;
  }

  .file-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 16px 11px 36px;
    border-bottom: 1px solid #eaeef2;
    text-decoration: none;
    color: inherit;
    transition: background 0.12s;
  }

  .file-row:last-child { border-bottom: none; }

  .file-row:hover { background: #f3f8ff; }

  .file-icon {
    font-size: 16px;
    flex-shrink: 0;
    line-height: 1;
  }

  .file-name {
    font-size: 14px;
    color: #0969da;
    flex: 1;
    text-decoration: none;
  }

  .file-row:hover .file-name {
    text-decoration: underline;
  }

  .file-tag {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 12px;
    white-space: nowrap;
  }

  .tag-html {
    background: #ddf4ff;
    color: #0550ae;
    border: 1px solid #54aeff66;
  }

  .tag-wip {
    background: #fff8c5;
    color: #7d4e00;
    border: 1px solid #d4a72c66;
  }

  /* placeholder (no link) */
  .file-row.placeholder .file-name {
    color: #8c959f;
  }

  footer {
    margin-top: 32px;
    text-align: center;
    font-size: 12px;
    color: #8c959f;
  }
</style>
</head>
<body>
<div class="page">

  <!-- Header -->
  <div class="header">
    <div class="logo">T</div>
    <div class="header-text">
      <h1>TronLink 产品组文档目录</h1>
      <p>内部产品文档 · 3 个模块 · 3 份文档</p>
    </div>
  </div>

  <!-- Directory -->
  <div class="dir-box">

    <!-- app -->
    <div class="folder-group open">
      <div class="folder-row" onclick="toggle(this)">
        <span class="folder-icon">📁</span>
        <span class="folder-name">app</span>
        <span class="folder-count">1 个文档</span>
        <span class="chevron">▶</span>
      </div>
      <div class="file-list">
        <div class="file-row placeholder">
          <span class="file-icon">📄</span>
          <span class="file-name">理财 - 支持 USDD 获取</span>
          <span class="file-tag tag-wip">即将上传</span>
        </div>
      </div>
    </div>

    <!-- 插件 -->
    <div class="folder-group open">
      <div class="folder-row" onclick="toggle(this)">
        <span class="folder-icon">📁</span>
        <span class="folder-name">插件</span>
        <span class="folder-count">1 个文档</span>
        <span class="chevron">▶</span>
      </div>
      <div class="file-list">
        <div class="file-row placeholder">
          <span class="file-icon">📄</span>
          <span class="file-name">GasFree 在 USDT 转账页的露出</span>
          <span class="file-tag tag-wip">即将上传</span>
        </div>
      </div>
    </div>

    <!-- 其他 -->
    <div class="folder-group open">
      <div class="folder-row" onclick="toggle(this)">
        <span class="folder-icon">📁</span>
        <span class="folder-name">其他</span>
        <span class="folder-count">1 个文档</span>
        <span class="chevron">▶</span>
      </div>
      <div class="file-list">
        <a class="file-row" href="tronlink-agent-product-plan.html">
          <span class="file-icon">📋</span>
          <span class="file-name">TronLink Agent 支付需支持的功能</span>
          <span class="file-tag tag-html">交互文档</span>
        </a>
      </div>
    </div>

  </div>

  <footer>TronLink Product Team · 由 Claude 生成</footer>
</div>

<script>
  function toggle(row) {
    row.closest('.folder-group').classList.toggle('open');
  }
</script>
</body>
</html>
